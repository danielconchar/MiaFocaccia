<title>Focaccerias</title>
<style>
  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --surface2: #f9f8f5;
    --border: #e5e3dc;
    --border2: #d0cec5;
    --text: #1a1a18;
    --text2: #6b6960;
    --text3: #9b9890;
    --accent: #2d5a27;
    --accent-bg: #eaf3e8;
    --accent-text: #2d5a27;
    --warn: #7a4a00;
    --warn-bg: #fff4e0;
    --danger: #8b1a1a;
    --danger-bg: #fdf0f0;
    --radius: 10px;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bot: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); font-size: 15px; }
  
  #app { display: flex; flex-direction: column; height: 100dvh; }
  
  /* Header */
  .hdr { background: var(--surface); border-bottom: 1px solid var(--border); padding: calc(var(--safe-top) + 12px) 16px 12px; display: flex; align-items: center; justify-content: space-between; }
  .hdr-title { font-size: 17px; font-weight: 600; }
  .hdr-sub { font-size: 12px; color: var(--text3); margin-top: 1px; }
  .hdr-badge { background: var(--warn-bg); color: var(--warn); font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 20px; }

  /* Content */
  .content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 16px; padding-bottom: calc(80px + var(--safe-bot)); }

  /* Bottom nav */
  .nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); border-top: 1px solid var(--border); display: flex; padding-bottom: var(--safe-bot); }
  .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px 0; gap: 3px; color: var(--text3); font-size: 10px; font-weight: 500; border: none; background: none; cursor: pointer; }
  .nav-btn svg { width: 22px; height: 22px; }
  .nav-btn.active { color: var(--accent); }

  /* Cards */
  .card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); padding: 14px; margin-bottom: 10px; }
  .card-title { font-size: 13px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; }

  /* Metrics grid */
  .metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
  .metric { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); padding: 12px; }
  .metric .lbl { font-size: 11px; color: var(--text3); margin-bottom: 4px; }
  .metric .val { font-size: 20px; font-weight: 700; }
  .metric.wide { grid-column: span 2; }

  /* Order list */
  .order-item { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); padding: 12px 14px; margin-bottom: 8px; }
  .order-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
  .order-name { font-weight: 600; font-size: 15px; }
  .order-total { font-weight: 700; font-size: 15px; }
  .order-meta { font-size: 12px; color: var(--text3); margin-bottom: 6px; }
  .order-prods { font-size: 12px; color: var(--text2); margin-bottom: 8px; }
  .order-footer { display: flex; justify-content: space-between; align-items: center; }
  
  /* Badges */
  .badge { display: inline-block; padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .badge-pend { background: var(--warn-bg); color: var(--warn); }
  .badge-pag { background: var(--accent-bg); color: var(--accent-text); }
  .badge-ent { background: #f0f0f0; color: var(--text2); }

  /* Select inline */
  select.inline { border: 1px solid var(--border2); border-radius: 6px; font-size: 12px; padding: 4px 6px; background: var(--bg); color: var(--text); font-family: inherit; }

  /* Filters */
  .filters { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
  .filter-btn { padding: 6px 12px; border-radius: 20px; font-size: 12px; border: 1px solid var(--border2); background: var(--surface); color: var(--text2); cursor: pointer; font-family: inherit; }
  .filter-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

  /* Form */
  .form-group { margin-bottom: 14px; }
  .form-group label { display: block; font-size: 12px; font-weight: 600; color: var(--text2); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.3px; }
  .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 11px 12px; border: 1px solid var(--border2); border-radius: var(--radius); font-size: 15px; background: var(--surface); color: var(--text); font-family: inherit; -webkit-appearance: none; }
  .form-group textarea { height: 80px; resize: none; }
  .form-row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  /* Product rows */
  .prod-item { background: var(--surface2); border-radius: 8px; border: 1px solid var(--border); padding: 10px; margin-bottom: 8px; }
  .prod-item select { width: 100%; padding: 8px; border: 1px solid var(--border2); border-radius: 8px; font-size: 13px; background: var(--surface); color: var(--text); font-family: inherit; margin-bottom: 8px; -webkit-appearance: none; }
  .prod-item-row { display: flex; align-items: center; justify-content: space-between; }
  .qty-control { display: flex; align-items: center; gap: 10px; }
  .qty-btn { width: 30px; height: 30px; border-radius: 50%; border: 1px solid var(--border2); background: var(--surface); font-size: 18px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text); font-family: inherit; }
  .qty-val { font-size: 16px; font-weight: 600; min-width: 20px; text-align: center; }
  .prod-price { font-size: 13px; color: var(--text2); }
  .prod-del { color: var(--danger); font-size: 13px; background: none; border: none; cursor: pointer; padding: 4px; font-family: inherit; }

  /* Total bar */
  .total-bar { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); padding: 14px; margin: 12px 0; display: flex; justify-content: space-between; align-items: center; }
  .total-bar .lbl { font-size: 13px; color: var(--text2); }
  .total-bar .val { font-size: 22px; font-weight: 700; }

  /* Buttons */
  .btn-primary { width: 100%; padding: 14px; background: var(--accent); color: white; border: none; border-radius: var(--radius); font-size: 16px; font-weight: 600; cursor: pointer; font-family: inherit; }
  .btn-secondary { width: 100%; padding: 12px; background: var(--surface); color: var(--text); border: 1px solid var(--border2); border-radius: var(--radius); font-size: 15px; cursor: pointer; font-family: inherit; margin-top: 8px; }
  .btn-add { display: flex; align-items: center; gap: 6px; padding: 10px 14px; background: var(--accent-bg); color: var(--accent); border: 1px dashed var(--accent); border-radius: var(--radius); font-size: 14px; cursor: pointer; font-family: inherit; width: 100%; justify-content: center; margin-bottom: 4px; }

  /* Bar chart */
  .bar-item { margin-bottom: 12px; }
  .bar-head { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 4px; }
  .bar-track { height: 8px; background: var(--bg); border-radius: 4px; overflow: hidden; }
  .bar-fill { height: 100%; background: var(--accent); border-radius: 4px; }

  /* Commission table */
  .com-row { display: flex; align-items: center; padding: 11px 0; border-bottom: 1px solid var(--border); gap: 6px; font-size: 13px; }
  .com-row:last-child { border-bottom: none; }
  .com-name { flex: 1.2; font-weight: 600; }
  .com-ventas { flex: 1.3; text-align: right; }
  .com-pct { flex: 0.6; text-align: right; color: var(--text3); }
  .com-val { flex: 1.3; text-align: right; font-weight: 700; color: var(--accent); }

  /* Month tabs */
  .month-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; padding-bottom: 4px; margin-bottom: 12px; }
  .month-tabs { display: flex; gap: 6px; white-space: nowrap; padding: 2px 0; }
  .month-tab { padding: 6px 12px; border-radius: 20px; font-size: 12px; border: 1px solid var(--border2); background: var(--surface); color: var(--text2); cursor: pointer; font-family: inherit; }
  .month-tab.active { background: var(--accent); color: white; border-color: var(--accent); }

  /* Loading */
  .loading { text-align: center; padding: 40px 20px; color: var(--text3); font-size: 14px; }
  .loading-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: var(--accent); margin: 0 3px; animation: pulse 1.2s ease-in-out infinite; }
  .loading-dot:nth-child(2) { animation-delay: 0.2s; }
  .loading-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes pulse { 0%,80%,100%{opacity:0.3;transform:scale(0.8)} 40%{opacity:1;transform:scale(1)} }

  .empty { text-align: center; padding: 40px 20px; color: var(--text3); font-size: 14px; }
  .sync-bar { background: var(--accent-bg); color: var(--accent-text); font-size: 12px; padding: 6px 16px; text-align: center; }
  .error-bar { background: var(--danger-bg); color: var(--danger); font-size: 12px; padding: 6px 16px; text-align: center; }

  /* Pagination */
  .pag { display: flex; justify-content: center; align-items: center; gap: 12px; padding: 12px 0; font-size: 13px; color: var(--text2); }
  .pag-btn { padding: 6px 14px; border-radius: 8px; border: 1px solid var(--border2); background: var(--surface); color: var(--text); cursor: pointer; font-size: 13px; font-family: inherit; }
  .pag-btn:disabled { opacity: 0.4; }
</style>
</head>

let orders = [];
let tab = 'pedidos';
let filterEstado = '';
let filterVend = '';
let ingMes = 'total';
let comMes = '';
let page = 0;
const PER = 20;
let newItems = [];
let comPct = { mane:10, daniel:10, luca:10, german:25 };

const fmt = n => '$' + Math.round(n).toLocaleString('es-CL');

// Supabase API
async function sbFetch(path, opts={}) {
  const r = await fetch(SUPA_URL + '/rest/v1/' + path, {
    ...opts,
    headers: { ...HEADERS, ...(opts.headers||{}) }
  });
  if (!r.ok) { const t = await r.text(); throw new Error(t); }
  return r.status === 204 ? null : r.json();
}

async function loadOrders() {
  setStatus('Sincronizando...', false);
  try {
    const data = await sbFetch('pedidos?order=id.desc&limit=1000');
    if (data.length === 0) {
      // Primera vez: cargar histórico
      setStatus('Cargando historial...', false);
      await seedHistory();
      const data2 = await sbFetch('pedidos?order=id.desc&limit=1000');
      orders = data2;
    } else {
      orders = data;
    }
    setStatus('Sincronizado ✓', false);
    updateBadge();
    render();
  } catch(e) {
    setStatus('Sin conexión — datos locales', true);
    orders = [...HIST].reverse();
    updateBadge();
    render();
  }
}

async function seedHistory() {
  const chunks = [];
  for (let i = 0; i < HIST.length; i += 50) chunks.push(HIST.slice(i, i+50));
  for (const chunk of chunks) {
    await sbFetch('pedidos', {
      method: 'POST',
      headers: { 'Prefer': 'resolution=ignore-duplicates,return=minimal' },
      body: JSON.stringify(chunk)
    });
  }
}

async function saveOrder(order) {
  await sbFetch('pedidos', {
    method: 'POST',
    headers: { 'Prefer': 'resolution=merge-duplicates,return=minimal' },
    body: JSON.stringify(order)
  });
}

async function updateEstado(id, estado) {
  await sbFetch('pedidos?id=eq.' + id, {
    method: 'PATCH',
    body: JSON.stringify({ estado })
  });
}

async function deleteOrder(id) {
  await sbFetch('pedidos?id=eq.' + id, { method: 'DELETE' });
}

function setStatus(msg, err) {
  document.getElementById('sync-status').textContent = msg;
  const sb = document.getElementById('status-bar');
  sb.className = err ? 'error-bar' : '';
  sb.textContent = err ? msg : '';
}

function updateBadge() {
  const pend = orders.filter(o => o.estado === 'Pendiente').length;
  const b = document.getElementById('pend-badge');
  if (pend > 0) { b.textContent = pend + ' pendientes'; b.style.display = ''; }
  else b.style.display = 'none';
}

function goTab(t, btn) {
  tab = t; page = 0;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function render() {
  const c = document.getElementById('content');
  if (tab === 'pedidos') c.innerHTML = renderPedidos();
  else if (tab === 'nuevo') c.innerHTML = renderNuevo();
  else if (tab === 'ingresos') c.innerHTML = renderIngresos();
  else if (tab === 'comisiones') c.innerHTML = renderComisiones();
}

function renderPedidos() {
  let list = orders.filter(o =>
    (filterEstado ? o.estado === filterEstado : true) &&
    (filterVend ? o.vendedor === filterVend : true)
  );
  const total = list.length;
  const pages = Math.ceil(total / PER);
  if (page >= pages) page = Math.max(0, pages-1);
  const slice = list.slice(page*PER, (page+1)*PER);

  const totalFact = orders.reduce((s,o) => s+o.total, 0);
  const cobrado = orders.filter(o=>o.estado!=='Pendiente').reduce((s,o)=>s+o.total,0);
  const pend = orders.filter(o=>o.estado==='Pendiente').length;

  return `
  <div class="metrics">
    <div class="metric"><div class="lbl">Pedidos</div><div class="val">${orders.length}</div></div>
    <div class="metric"><div class="lbl">Pendientes</div><div class="val" style="color:var(--warn)">${pend}</div></div>
    <div class="metric"><div class="lbl">Facturado</div><div class="val" style="font-size:16px">${fmt(totalFact)}</div></div>
    <div class="metric"><div class="lbl">Cobrado</div><div class="val" style="font-size:16px;color:var(--accent)">${fmt(cobrado)}</div></div>
  </div>
  <div class="filters">
    <button class="filter-btn ${!filterEstado?'active':''}" onclick="filterEstado='';page=0;render()">Todos</button>
    <button class="filter-btn ${filterEstado==='Pendiente'?'active':''}" onclick="filterEstado='Pendiente';page=0;render()">Pendientes</button>
    <button class="filter-btn ${filterEstado==='Pagado'?'active':''}" onclick="filterEstado='Pagado';page=0;render()">Pagados</button>
    <select class="inline" onchange="filterVend=this.value;page=0;render()">
      <option value="" ${!filterVend?'selected':''}>Todos</option>
      ${Object.entries(VEND).map(([k,n])=>`<option value="${k}" ${filterVend===k?'selected':''}>${n}</option>`).join('')}
    </select>
  </div>
  ${!slice.length ? '<div class="empty">No hay pedidos</div>' : slice.map(o => `
  <div class="order-item">
    <div class="order-top">
      <div class="order-name">${o.cliente}</div>
      <div class="order-total">${fmt(o.total)}</div>
    </div>
    <div class="order-meta">${o.fecha||'—'} · ${o.vendedor ? VEND[o.vendedor]||o.vendedor : '—'}</div>
    <div class="order-prods">${o.items.map(i=>`${i.qty}× ${i.name.split(' (')[0]}`).join(', ')}</div>
    <div class="order-footer">
      <select class="inline" onchange="doEstado(${o.id},this.value)">
        <option value="Pendiente" ${o.estado==='Pendiente'?'selected':''}>⏳ Pendiente</option>
        <option value="Pagado" ${o.estado==='Pagado'?'selected':''}>✓ Pagado</option>
        <option value="Entregado" ${o.estado==='Entregado'?'selected':''}>📦 Entregado</option>
      </select>
      <button onclick="doDelete(${o.id})" style="background:none;border:none;color:var(--danger);font-size:13px;cursor:pointer;padding:4px">Eliminar</button>
    </div>
  </div>`).join('')}
  ${pages > 1 ? `<div class="pag">
    <button class="pag-btn" onclick="page--;render()" ${page===0?'disabled':''}>←</button>
    <span>${page+1} / ${pages}</span>
    <button class="pag-btn" onclick="page++;render()" ${page===pages-1?'disabled':''}>→</button>
  </div>` : ''}`;
}

function renderNuevo() {
  const total = newItems.reduce((s,i) => s + i.price*i.qty, 0);
  const tmr = new Date(); tmr.setDate(tmr.getDate()+1);
  const defDate = tmr.toISOString().split('T')[0];
  return `
  <div class="card">
    <div class="card-title">Nuevo pedido</div>
    <div class="form-group"><label>Cliente</label><input id="nc" placeholder="Nombre del cliente"></div>
    <div class="form-row2">
      <div class="form-group"><label>Teléfono</label><input id="nt" placeholder="+56 9..."></div>
      <div class="form-group"><label>Fecha entrega</label><input type="date" id="nf" value="${defDate}"></div>
    </div>
    <div class="form-group"><label>Vendedor/a</label>
      <select id="nv">
        <option value="">Sin comisión</option>
        ${Object.entries(VEND).map(([k,n])=>`<option value="${k}">${n}${k==='german'?' (25%)':''}</option>`).join('')}
      </select>
    </div>
    <div class="card-title" style="margin-bottom:8px">Productos</div>
    ${newItems.map((item,i) => `
    <div class="prod-item">
      <select onchange="newItems[${i}].price=parseInt(this.options[this.selectedIndex].getAttribute('data-p'));newItems[${i}].name=this.options[this.selectedIndex].text;updTotal()">
        ${PRODS.map(p=>`<option data-p="${p.price}" ${item.name===p.name?'selected':''}>${p.name}</option>`).join('')}
      </select>
      <div class="prod-item-row">
        <div class="qty-control">
          <button class="qty-btn" onclick="newItems[${i}].qty=Math.max(1,newItems[${i}].qty-1);updTotal()">−</button>
          <span class="qty-val">${item.qty}</span>
          <button class="qty-btn" onclick="newItems[${i}].qty++;updTotal()">+</button>
        </div>
        <span class="prod-price">${fmt(item.price * item.qty)}</span>
        <button class="prod-del" onclick="newItems.splice(${i},1);render()">✕</button>
      </div>
    </div>`).join('')}
    <button class="btn-add" onclick="newItems.push({name:PRODS[0].name,price:PRODS[0].price,qty:1});render()">+ Agregar producto</button>
    <div class="form-group"><label>Notas</label><textarea id="nn" placeholder="Indicaciones..."></textarea></div>
    <div class="total-bar"><span class="lbl">Total</span><span class="val" id="ntotal">${fmt(total)}</span></div>
    <button class="btn-primary" onclick="doGuardar()">Guardar pedido</button>
    <button class="btn-secondary" onclick="newItems=[];render()">Cancelar</button>
  </div>`;
}

function updTotal() {
  const t = newItems.reduce((s,i) => s+i.price*i.qty, 0);
  const el = document.getElementById('ntotal');
  if (el) el.textContent = fmt(t);
  // re-render qty displays
  render();
}

function renderIngresos() {
  const ords = ingMes === 'total' ? orders : orders.filter(o => o.fecha && o.fecha.startsWith(ingMes));
  const total = ords.reduce((s,o)=>s+o.total,0);
  const cob = ords.filter(o=>o.estado!=='Pendiente').reduce((s,o)=>s+o.total,0);
  const porCob = ords.filter(o=>o.estado==='Pendiente').reduce((s,o)=>s+o.total,0);
  const counts = {};
  ords.forEach(o=>o.items.forEach(i=>{
    const k=i.name.split(' (')[0];
    counts[k]=(counts[k]||0)+i.qty;
  }));
  const sorted = Object.entries(counts).sort((a,b)=>b[1]-a[1]);
  const mx = sorted[0]?.[1]||1;
  const months = [
    ['total','Todo'],['2025-07','Jul 25'],['2025-08','Ago 25'],['2025-09','Sep 25'],
    ['2025-10','Oct 25'],['2025-11','Nov 25'],['2025-12','Dic 25'],
    ['2026-01','Ene 26'],['2026-03','Mar 26'],['2026-04','Abr 26'],
    ['2026-05','May 26'],['2026-06','Jun 26'],['2026-07','Jul 26']
  ];
  return `
  <div class="month-scroll"><div class="month-tabs">
    ${months.map(([v,l])=>`<button class="month-tab ${ingMes===v?'active':''}" onclick="ingMes='${v}';render()">${l}</button>`).join('')}
  </div></div>
  <div class="metrics">
    <div class="metric"><div class="lbl">Facturado</div><div class="val" style="font-size:16px">${fmt(total)}</div></div>
    <div class="metric"><div class="lbl">Cobrado</div><div class="val" style="font-size:16px;color:var(--accent)">${fmt(cob)}</div></div>
    <div class="metric wide"><div class="lbl">Por cobrar</div><div class="val" style="color:var(--warn)">${fmt(porCob)}</div></div>
  </div>
  <div class="card">
    <div class="card-title">Más vendidos</div>
    ${sorted.length ? sorted.map(([n,q])=>`
    <div class="bar-item">
      <div class="bar-head"><span>${n}</span><span style="font-weight:600">${q} u.</span></div>
      <div class="bar-track"><div class="bar-fill" style="width:${Math.round(q/mx*100)}%"></div></div>
    </div>`).join('') : '<div class="empty">Sin datos</div>'}
  </div>`;
}

function renderComisiones() {
  const base = (comMes ? orders.filter(o=>o.fecha&&o.fecha.startsWith(comMes)) : orders)
    .filter(o=>o.estado!=='Pendiente');
  const stats = {};
  Object.keys(VEND).forEach(k=>stats[k]={total:0,pedidos:0});
  base.forEach(o=>{if(o.vendedor&&stats[o.vendedor]){stats[o.vendedor].total+=o.total;stats[o.vendedor].pedidos++;}});
  const totalCom = Object.keys(VEND).reduce((s,k)=>s+stats[k].total*(comPct[k]/100),0);
  const months = [
    ['','Todo el período'],['2025-07','Jul 2025'],['2025-08','Ago 2025'],['2025-09','Sep 2025'],
    ['2025-10','Oct 2025'],['2025-11','Nov 2025'],['2025-12','Dic 2025'],
    ['2026-01','Ene 2026'],['2026-03','Mar 2026'],['2026-04','Abr 2026'],
    ['2026-05','May 2026'],['2026-06','Jun 2026'],['2026-07','Jul 2026']
  ];
  return `
  <div class="card">
    <div class="card-title">Porcentajes</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      ${Object.entries(VEND).map(([k,n])=>`
      <div class="form-group">
        <label>${n} (%)</label>
        <input type="number" value="${comPct[k]}" min="0" max="100" onchange="comPct['${k}']=parseInt(this.value)||0;render()" style="padding:8px;font-size:15px">
      </div>`).join('')}
    </div>
  </div>
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <div class="card-title" style="margin-bottom:0">Resumen</div>
      <select class="inline" onchange="comMes=this.value;render()">
        ${months.map(([v,l])=>`<option value="${v}" ${comMes===v?'selected':''}>${l}</option>`).join('')}
      </select>
    </div>
    ${Object.entries(VEND).map(([k,n])=>`
    <div class="com-row">
      <span class="com-name">${n}${k==='german'?' <span class="badge badge-pend" style="font-size:10px">25%</span>':''}</span>
      <span class="com-ventas">${fmt(stats[k].total)}</span>
      <span class="com-pct">${comPct[k]}%</span>
      <span class="com-val">${fmt(stats[k].total*(comPct[k]/100))}</span>
    </div>`).join('')}
    <div style="display:flex;justify-content:space-between;padding:12px 0 0;border-top:1px solid var(--border);margin-top:4px;font-size:14px">
      <span style="color:var(--text2);font-weight:600">Total a pagar</span>
      <span style="font-weight:700;font-size:16px">${fmt(totalCom)}</span>
    </div>
    <p style="font-size:11px;color:var(--text3);margin-top:8px">Solo incluye pedidos pagados o entregados.</p>
  </div>`;
}

async function doEstado(id, estado) {
  const o = orders.find(o=>o.id===id);
  if (o) { o.estado = estado; updateBadge(); }
  try { await updateEstado(id, estado); setStatus('Sincronizado ✓', false); }
  catch(e) { setStatus('Error al guardar', true); }
}

async function doDelete(id) {
  if (!confirm('¿Eliminar este pedido?')) return;
  orders = orders.filter(o=>o.id!==id);
  updateBadge(); render();
  try { await deleteOrder(id); setStatus('Sincronizado ✓', false); }
  catch(e) { setStatus('Error al eliminar', true); }
}

async function doGuardar() {
  const c = document.getElementById('nc')?.value.trim();
  if (!c) { alert('Ingresá el nombre del cliente'); return; }
  if (!newItems.length) { alert('Agregá al menos un producto'); return; }
  const total = newItems.reduce((s,i)=>s+i.price*i.qty,0);
  const order = {
    id: Date.now(),
    cliente: c,
    telefono: document.getElementById('nt')?.value.trim()||'',
    fecha: document.getElementById('nf')?.value||'',
    vendedor: document.getElementById('nv')?.value||'',
    notas: document.getElementById('nn')?.value.trim()||'',
    items: newItems.map(i=>({name:i.name,price:i.price,qty:i.qty})),
    total,
    estado: 'Pendiente',
    creado: new Date().toISOString()
  };
  orders.unshift(order);
  newItems = [];
  updateBadge();
  tab = 'pedidos'; page = 0;
  document.querySelectorAll('.nav-btn').forEach((b,i)=>b.classList.toggle('active',i===0));
  render();
  try {
    await saveOrder(order);
    setStatus('Guardado ✓', false);
  } catch(e) { setStatus('Error al guardar', true); }
}

// Init
loadOrders();
</script>
